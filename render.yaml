services:
  # Backend API Service
  - type: web
    name: cybermauro-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://cybermauro-frontend.onrender.com

  # Frontend Static Site
  - type: static
    name: cybermauro-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: https://cybermauro-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
